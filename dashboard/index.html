<div class="scanlines"></div>
<!-- ── LEAFLET FULLSCREEN OVERLAY (hors tuile, jamais détruit par les refreshs) ── -->
<div id="lf-fullscreen">
  <div id="lf-topbar">
    <div id="lf-topbar-left">
      <span id="lf-live-dot"></span>
      <span id="lf-topbar-title">&#9670; SOC MAP</span>
      <span id="lf-ip-count"></span>
      <span id="lf-refresh-at" style="font:var(--fs-xs) 'Courier New';color:rgba(0,255,136,.35)"></span>
    </div>
    <div id="lf-threat-bar"></div>
    <div id="lf-topbar-right">
      <span id="lf-time"></span>
      <button id="lf-close-btn">ESC &nbsp;&#10005;</button>
    </div>
  </div>
  <div id="lf-map-container"></div>
  <div id="lf-bottombar"></div>
</div>
<div class="page">

<div class="header">
  <div class="header-left">
    <div>
      <div class="logo-text"><span class="logo-bracket">[</span> 0xCyberLiTech <span class="logo-bracket">]</span></div>
      <div class="logo-sub">SOC MONITORING DASHBOARD — votre-serveur</div>
    </div>
    <div class="status-pill"><span class="status-dot-sm"></span>ONLINE</div>
  </div>
  <div class="header-center">
    <button class="fw-btn hdr-btn" id="fw-btn">&#9632; FIREWALL</button>
    <button class="tr-btn hdr-btn" id="tr-btn">&#9672; TRAFIC</button>
    <button class="rpt-btn hdr-btn" id="rpt-btn" title="Envoyer le rapport SOC maintenant [E]">&#9993; RAPPORT</button>
    <button class="hdr-btn" id="pro-ping-btn" style="border-color:rgba(0,255,136,0.3);color:rgba(0,255,136,0.8);background:rgba(0,255,136,0.04)">&#11042; PING JARVIS</button>
    <button class="fs-btn" id="fs-btn" title="Mode projection SOC [Z]">&#9633;</button>
  </div>
  <div class="header-right">
    <div class="header-clock">
      <div class="soc-clock" id="soc-clock">--:--:--</div>
      <div class="gen-time">LAST UPDATE <span id="gen-at">—</span></div>
      <div class="refresh-track"><div class="refresh-fill" id="fill"></div></div>
    </div>
    <div id="hdr-jarvis"></div>
  </div>
</div>

<div class="as-strip ok" id="as-strip">
  <span class="as-lbl ok" id="as-lbl">◉ NOMINAL</span>
  <span id="as-items"><span class="as-tag as-ok">✓ EN ATTENTE DES DONNÉES...</span></span>
  <div class="as-r">
    <span class="fr-dot" id="fr-dot"></span>
    <span id="as-age">—</span>
  </div>
</div>
<div class="summary" id="summary"></div>
<div class="grid" id="grid">
  <div class="card wide loading-card">INITIALISATION...</div>
</div>

<!-- MODAL OVERLAY -->
<div class="modal-overlay" id="overlay">
  <div class="modal-card" id="modal-card">
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="modal-header">
      <span class="modal-header-title" id="modal-header-title">// DÉTAIL</span>
      <button class="modal-close" id="modal-close" title="Fermer [Esc]">&#215; ESC</button>
    </div>
    <div class="modal-body-inner" id="modal-body"></div>
  </div>
</div>

<div class="footer">
  <div class="footer-left">votre-serveur &mdash; 192.168.x.x:8080 &mdash; LAN ONLY &mdash; 192.168.x.0/24</div>
  <a class="goa-btn" href="/goaccess.html" target="_blank">&#62; RAPPORT GOACCESS</a>
</div>

</div>

<div class="map-tooltip" id="map-tip"></div>
<div id="ip-hud">
  <div class="ih-corner tl"></div><div class="ih-corner tr"></div>
  <div class="ih-corner bl"></div><div class="ih-corner br"></div>
  <div class="ih-hdr">
    <div><span class="ih-ip" id="ih-ip-val">—</span><span class="ih-cc" id="ih-cc-val"></span></div>
    <div class="ih-close" id="ih-close">✕</div>
  </div>
  <div class="ih-body" id="ih-body"></div>
</div>
