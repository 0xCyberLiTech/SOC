# /etc/nginx/sites-available/site-02
# Reverse proxy vers backend <PA85-IP> (site-02 Apache)
# Domaine : <DOMAIN-FR>

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name <DOMAIN-FR> www.<DOMAIN-FR>;
    return 301 https://$host$request_uri;
}

# HTTPS principal
server {
    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    server_name <DOMAIN-FR> www.<DOMAIN-FR>;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/<DOMAIN-FR>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<DOMAIN-FR>/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/html;
    client_max_body_size 1m;
    client_header_timeout 10s;
    client_body_timeout   15s;

    proxy_hide_header Content-Security-Policy;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Permissions-Policy;
    proxy_hide_header Strict-Transport-Security;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"                          always;
    add_header X-Content-Type-Options     "nosniff"                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://maps.gstatic.com https://maps.googleapis.com https://*.ggpht.com; font-src 'self'; frame-src https://www.google.com https://maps.google.com; frame-ancestors 'none'; base-uri 'self';" always;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    location ~* \.(env|git|htaccess|htpasswd|bak|sql|log|sh|conf|ini|swp|orig)$ {
        deny all;
        return 404;
    }

    location ~* ^/(audit-technique\.html|phpinfo\.php)$ { deny all; return 404; }
    location ^~ /docs/ { deny all; return 404; }
    location ^~ /dist/ { deny all; return 404; }
    location ~ /\.      { deny all; return 404; }

    location = /send-rdv.php {
        if ($geo_blocked) { return 403; }
        limit_req zone=contact_form burst=3 nodelay;
        limit_req_status 429;
        limit_except POST OPTIONS { deny all; }

        proxy_pass http://<PA85-IP>;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $server_name;
        proxy_connect_timeout 15s;
        proxy_send_timeout    15s;
        proxy_read_timeout    15s;
    }

    location / {
        if ($geo_blocked) { return 403; }
        limit_req zone=general burst=30 nodelay;
        limit_req_status 429;
        limit_except GET HEAD { deny all; }

        proxy_pass http://<PA85-IP>;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $server_name;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    include /etc/nginx/snippets/crowdsec-appsec.conf;
}
