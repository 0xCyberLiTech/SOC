# /etc/nginx/sites-available/site-01
# Reverse proxy vers backend <CLT-IP> (site-01 Apache)
# Domaine : <DOMAIN-COM>

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name <DOMAIN-COM> www.<DOMAIN-COM>;
    server_tokens off;
    return 301 https://$host$request_uri;
}

# Proxy NVD — accès cron local uniquement (127.0.0.1:80)
server {
    listen 127.0.0.1:80;
    server_name localhost;

    include /etc/nginx/api-keys.conf;

    location /api/nvd/ {
        allow 127.0.0.1;
        deny  all;
        limit_except GET { deny all; }

        proxy_pass            https://services.nvd.nist.gov/rest/json/cves/2.0/;
        proxy_ssl_server_name on;
        proxy_ssl_name        services.nvd.nist.gov;
        proxy_ssl_protocols   TLSv1.2 TLSv1.3;

        proxy_set_header Host       services.nvd.nist.gov;
        proxy_set_header apiKey     $nvd_api_key;
        proxy_set_header User-Agent "<GITHUB-USER>-Cron/1.0";

        proxy_hide_header X-RateLimit-Limit;
        proxy_hide_header X-RateLimit-Remaining;
        proxy_hide_header X-RateLimit-Reset;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Server;
        proxy_hide_header Via;
        proxy_hide_header X-Cache;

        proxy_connect_timeout 90s;
        proxy_send_timeout    90s;
        proxy_read_timeout    90s;
    }

    location / { return 444; }
}

# HTTPS principal
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name <DOMAIN-COM> www.<DOMAIN-COM>;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/<DOMAIN-COM>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<DOMAIN-COM>/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/nginx/api-keys.conf;

    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Permissions-Policy;
    proxy_hide_header Strict-Transport-Security;

    client_header_timeout 10s;
    client_body_timeout   15s;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    location /api/nvd/ { deny all; }

    location /assets/data/ {
        root /var/www/clt;
        try_files $uri =404;
        if ($geo_blocked) { return 403; }
        limit_except GET { deny all; }
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
        include /etc/nginx/snippets/security-headers-clt.conf;
    }

    location ~ /\. { deny all; return 404; }
    location /docs  { return 404; }

    location ~* \.(php|sql|bak|ini|conf|sh|log|swp|orig|htpasswd)$ {
        deny all;
        return 404;
    }

    location / {
        limit_req zone=global burst=100 nodelay;
        if ($geo_blocked) { return 403; }
        limit_except GET HEAD POST { deny all; }
        include /etc/nginx/snippets/security-headers-clt.conf;

        proxy_pass         http://<CLT-IP>;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $server_name;
        proxy_connect_timeout 10s;
        proxy_send_timeout    20s;
        proxy_read_timeout    20s;
    }

    include /etc/nginx/snippets/crowdsec-appsec.conf;
}
