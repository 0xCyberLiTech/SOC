# /etc/nginx/sites-available/monitoring
# Dashboard SOC — accès LAN uniquement
# Accès : http://<SRV-NGIX-IP>:8080/
# UFW   : ufw allow in to <SRV-NGIX-IP> port 8080 proto tcp from <LAN-CIDR>

limit_req_zone $binary_remote_addr zone=report_trigger:1m rate=2r/m;

server {
    listen <SRV-NGIX-IP>:8080;
    server_name _;
    server_tokens off;

    root /var/www/monitoring;
    index index.html;

    gzip            on;
    gzip_types      application/json text/plain text/css application/javascript;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_vary       on;

    allow <LAN-CIDR>;
    deny all;

    add_header X-Frame-Options        "DENY"        always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "no-referrer" always;
    add_header Cache-Control          "no-store"    always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com; connect-src 'self' http://localhost:5000 http://127.0.0.1:5000 ws://localhost:5000 ws://127.0.0.1:5000; font-src 'self'; frame-ancestors 'none'; object-src 'none';" always;

    location = /world.json {
        add_header Cache-Control "public, max-age=604800, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    location ~ /\. { deny all; }

    location = /monitoring.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location = /api/trigger-report {
        limit_req        zone=report_trigger burst=1 nodelay;
        limit_req_status 429;
        proxy_pass       http://127.0.0.1:8089/trigger-report;
        proxy_method     POST;
        proxy_set_header Host $host;
        proxy_read_timeout 35s;
        add_header       Cache-Control "no-store" always;
    }

    location = /api/report-status {
        proxy_pass       http://127.0.0.1:8089/status;
        proxy_set_header Host $host;
        add_header       Cache-Control "no-store" always;
    }

    location ~* \.(js|css)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Expires "0" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    location = /goaccess.html {
        add_header X-Frame-Options        "DENY"        always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header Referrer-Policy        "no-referrer" always;
        add_header Cache-Control          "no-store"    always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self' data:; object-src 'none';" always;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
