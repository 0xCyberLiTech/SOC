# Recepteur rsyslog central — logs cross-machines LAN
# v1.6.1 — 2026-04-25 — Fix: fail2ban.actions exclu du filtre startswith "fail2ban."

module(load="imtcp")
input(type="imtcp" port="514" address="<SRV-NGIX-IP>")
module(load="imudp")
input(type="imudp" port="514" address="<SRV-NGIX-IP>")

$template CentralLogs,"/var/log/central/%HOSTNAME%/%PROGRAMNAME%.log"

if $fromhost-ip startswith "192.168.1." then {

    # ── Bruit global (tous hôtes) ─────────────────────────────────────────
    if  $PROGRAMNAME == "(sd-pam)"                  or
        $PROGRAMNAME == "(systemd)"                 or
        $PROGRAMNAME == "systemd"                   or
        $PROGRAMNAME == "systemd-logind"            or
        $PROGRAMNAME == "systemd-timesyncd"         or
        $PROGRAMNAME == "systemd-tmpfiles"          or
        $PROGRAMNAME == "qemu-ga"                   or
        $PROGRAMNAME == "fstrim"                    or
        $PROGRAMNAME == "rsyslogd"                  or
        $PROGRAMNAME == "fail2ban-client"           or
        $PROGRAMNAME == "fail2ban-server"           or
        ($PROGRAMNAME startswith "fail2ban." and $PROGRAMNAME != "fail2ban.actions") or
        $PROGRAMNAME == "CRON"                     or
        $PROGRAMNAME == "cron"                     or
        $PROGRAMNAME == "crontab"                  or
        $PROGRAMNAME == "pidof"                    or
        $PROGRAMNAME == "test"
    then stop

    # ── Bruit PVE : hors scope SOC ────────────────────────────────────────
    if $HOSTNAME == "pve" and (
        $PROGRAMNAME == "chronyd"                   or
        $PROGRAMNAME == "dbus-daemon"               or
        $PROGRAMNAME == "perl"                      or
        $PROGRAMNAME == "pvescheduler"              or
        $PROGRAMNAME == "pvestatd"                  or
        $PROGRAMNAME == "pveupdate"                 or
        $PROGRAMNAME == "pve-ha-crm"               or
        $PROGRAMNAME == "pve-ha-lrm"               or
        $PROGRAMNAME == "qmeventd"                  or
        $PROGRAMNAME == "qm"                        or
        $PROGRAMNAME == "query-machine-capabilities" or
        $PROGRAMNAME == "spiceproxy"               or
        $PROGRAMNAME == "proxmox-mail-forward"     or
        $PROGRAMNAME == "xfs_scrub_all"            or
        $PROGRAMNAME == "zed"
    ) then stop

    # ── GT-BE98 : whitelist sécurité uniquement ───────────────────────────
    if $HOSTNAME startswith "GT-BE98" and
       $PROGRAMNAME != "kernel"        and
       $PROGRAMNAME != "dnsmasq-dhcp"  and
       $PROGRAMNAME != "WAN"           and
       $PROGRAMNAME != "dropbear"
    then stop

    # ── Écriture ──────────────────────────────────────────────────────────
    ?CentralLogs
    stop
}
