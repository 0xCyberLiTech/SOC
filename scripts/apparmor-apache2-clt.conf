include <tunables/global>

# AppArmor profile — Apache2 sur VM clt (<CLT-IP>)
# Site statique CLT + ModSecurity OWASP CRS 3.3.7
# Créé le 2026-04-11 par 0xCyberLiTech

/usr/sbin/apache2 {

  # Binaires + bibliothèques
  /usr/sbin/apache2  mr,
  /usr/lib/**        mr,
  /lib/**            mr,
  /lib64/**          mr,

  # Linker + libc
  /etc/ld.so.cache   r,

  # Config système
  /etc/apache2/      r,
  /etc/apache2/**    r,
  /etc/modsecurity/  r,
  /etc/modsecurity/** r,
  /usr/share/modsecurity-crs/  r,
  /usr/share/modsecurity-crs/** r,
  /etc/ssl/          r,
  /etc/ssl/**        r,
  /etc/nsswitch.conf r,
  /etc/passwd        r,
  /etc/group         r,
  /etc/hosts         r,
  /etc/host.conf     r,
  /etc/resolv.conf   r,
  /etc/localtime     r,
  /etc/mime.types    r,
  /etc/locale.alias  r,
  /etc/gai.conf      r,
  /etc/machine-id      r,

  # Timezone
  /usr/share/zoneinfo/  r,
  /usr/share/zoneinfo/** r,

  # Webroot (lecture seule)
  /var/www/clt/      r,
  /var/www/clt/**    r,
  /var/www/html/     r,
  /var/www/html/**   r,
  /usr/share/apache2/  r,
  /usr/share/apache2/** r,

  # Logs
  /var/log/apache2/  rw,
  /var/lib/modsecurity/      rw,
  /var/lib/modsecurity/**    rwk,
  /var/log/apache2/** rw,
  /var/lib/modsecurity/      rw,
  /var/lib/modsecurity/**    rwk,

  # Runtime
  /run/apache2/      rw,
  /run/apache2/**    rw,
  /run/lock/         r,
  /run/lock/apache2/ rw,
  /run/lock/apache2/** rw,
  /run/systemd/userdb/ r,

  # Proc
  @{PROC}/@{pid}/   r,
  @{PROC}/sys/kernel/random/boot_id  r,
  @{PROC}/@{pid}/** r,
  @{PROC}/sys/kernel/ngroups_max r,

  # Dev
  /dev/urandom       r,
  /dev/null          rw,
  /dev/zero          rw,

  # Réseau (TCP + UDP + netlink)
  network inet  stream,
  network inet6 stream,
  network inet  dgram,
  network inet6 dgram,
  network netlink raw,
  network unix  stream,
  network unix  dgram,


  # Capacités
  capability net_bind_service,
  capability setuid,
  capability setgid,
  capability dac_override,
  capability kill,
  capability chown,

  # Signaux inter-workers Apache
  signal peer=/usr/sbin/apache2,
  signal peer=unconfined,
  ptrace (readby),
  ptrace (tracedby),

  # syslog pipe pour CustomLog (rsyslog centralisé)
  /usr/bin/logger rix,
  /dev/log rw,
}
